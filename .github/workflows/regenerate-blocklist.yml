name: Regenerate Blocklist

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Needed to push commits back to the repo

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download OISD Big List
        run: |
          curl -L https://big.oisd.nl/ -o ../oisd.txt

      - name: Compile Blocklist
        run: |
          npx @adguard/hostlist-compiler -v -c hostlist-compiler-config.json -o blocklist

      - name: Post-process Blocklist
        run: |
          # Remove all whitelisted entries
          sed -i '/^@@/d' blocklist
          # Remove empty lines
          sed -i '/^$/d' blocklist

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blocklist
          if git diff --cached --quiet; then
            echo "No changes in blocklist."
          else
            git commit -m "Auto-regenerated blocklist [skip ci]"
            git push
          fi
